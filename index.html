<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration-Form</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="container">

        <h2>Registration-Form</h2>
        <div class="close_container">
            <input type="" id="Name" placeholder="     👤 Name">
            <p id="Name_key">Enter your user name</p>
            <input type="email" id="Email" placeholder="     ✉ Mail">
            <p id="Mail_key">Enter your user mail</p>
            <div class="eye">

                <input type="password" id="Password"
                    placeholder="     🔒 Password                                          ">
                <p><i class="fa-solid fa-eye" style="color: rgb(0, 0, 0);" id="eye1"></i><i
                        class="fa-solid fa-eye-slash" style="color: rgb(0, 0, 0);" id="eye2"></i></p>
            </div>
            <p id="Password_key">Enter the password</p>
            <p class="min">Minimum 6 characters</p>
        </div>

        <button type="button" id="button">Register</button>
        <h3 class="final">Registered Successfully</h3>
    </div>


</body>
<script src="js.js"></script>

</html>
